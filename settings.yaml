# Ping Monitor - Settings Hub Schema
# Describes how settings hub should present ping-monitor configuration

config_file: config.toml

# Organization
category: Network
priority: 10

# Display
title: Ping Monitor
icon: network-transmit-receive

# Service (for restart button)
service: ping-monitor

# Merge into the Network module instead of showing separately
merge_into: network
merge_section: Ping Monitor Configuration

sections:
  - id: targets
    title: Targets
    description: Hosts to monitor for connectivity
    fields:
      - key: hosts
        type: string_list
        label: Hosts to Monitor
        description: Comma-separated list of IPs or hostnames
        placeholder: "8.8.8.8, 1.1.1.1"

  - id: schedule
    title: Schedule
    description: How often and how to run ping tests
    fields:
      - key: interval_seconds
        type: integer
        label: Test Interval
        description: Seconds between ping tests
        suffix: seconds
        min: 10
        max: 3600
        step: 10

      - key: packets
        type: integer
        label: Packets per Test
        description: Number of ping packets to send
        min: 1
        max: 10
        step: 1

      - key: timeout
        type: integer
        label: Packet Timeout
        description: Seconds to wait for each packet
        suffix: seconds
        min: 1
        max: 30
        step: 1

  - id: storage
    title: Data Storage
    description: History retention settings
    fields:
      - key: retention_days
        type: integer
        label: Retention Period
        description: How many days to keep ping history
        suffix: days
        min: 1
        max: 365
        step: 1
